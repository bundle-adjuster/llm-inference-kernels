# Reproducible conda environment for llm-inference-kernels.
#
#   conda env create -f environment.yml
#   conda activate llm-inference-kernels
#
# Notes:
# - The CUDA toolkit (nvcc, headers, libraries) is pinned to 12.4 so the project
#   does NOT depend on the system CUDA (11.8 — too old for the cu124 PyTorch
#   build). nvcc's MAJOR version must match torch's CUDA major (12), or building
#   the extension fails. Target GPU: RTX 4090 (Ada, sm_89, FP8-capable).
# - All CUDA packages come from conda-forge, with `cuda-version` pinning the
#   whole stack to 12.4. (Mixing in the `nvidia` channel installs a 12.4
#   metapackage but lets 13.x components leak in via channel priority —
#   conda-forge alone, pinned through cuda-version, stays internally consistent.)
# - Python packages install via requirements.txt in one pip resolve (vLLM pins
#   torch tightly; a single resolve avoids conda/pip version conflicts).
# - flash-attn needs a separate post-install step — see requirements.txt.
# - After a successful install, capture an exact lock:
#       conda env export --no-builds > environment.lock.yml
name: llm-inference-kernels

channels:
  - conda-forge

dependencies:
  - python=3.11
  - pip
  # --- build toolchain ---
  - cmake>=3.24
  - ninja
  - gxx_linux-64=12          # host compiler within CUDA 12.4's supported range
  # --- CUDA 12.4 toolkit (must match torch's cu124 build) ---
  - cuda-version=12.4        # pins the entire conda-forge CUDA stack to 12.4
  - cuda-toolkit=12.4        # nvcc, headers, libraries
  # --- python packages (single pip resolve) ---
  - pip:
      - -r requirements.txt
